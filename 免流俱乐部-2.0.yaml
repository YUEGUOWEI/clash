proxy-groups:
  - name: "GLOBAL"
    type: "select"
    proxies: ["🌀全局模式", "🎯节点选择", "🇨🇳国内选择", "🌐国际选择", "🔗链式前置", "🔗链式落地"]

  - name: "🌀全局模式"
    type: "select"
    proxies: ["📜规则模式", "🎯节点选择", "🇨🇳国内选择", "🌐国际选择"]

  - name: "🎯节点选择"
    proxies: ["REJECT", "DIRECT"]
    use: ["代理集合"]
    <<: *selectgroups_general

  - name: "🇨🇳国内选择"
    proxies: ["🎯节点选择", "🤖自动🇨🇳集合", "🔗链式落地"]
    use: ["代理集合"]
    <<: *selectgroups_cn

  - name: "🌐国际选择"
    proxies: ["🎯节点选择", "🤖自动🌐集合", "🔗链式落地"]
    use: ["代理集合"]
    <<: *selectgroups_intl

  - name: "🔗链式前置"
    proxies: ["🎯节点选择", "🤖自动🇨🇳集合"]
    use: ["代理集合"]
    <<: *selectgroups_cn

  - name: "🔗链式落地"
    proxies: ["REJECT", "🤖自动🌐🔗集合"]
    use: ["链式集合"]
    <<: *selectgroups_general

  - name: "📜规则模式"
    type: "select"
    proxies: ["PASS"]
    hidden: true

  - name: "🤖自动🇨🇳集合"
    use: ["代理集合"]
    <<: *testgroups_cn

  - name: "🤖自动🌐集合"
    use: ["代理集合"]
    <<: *testgroups_intl 

  - name: "🤖自动🌐🔗集合"
    use: ["链式集合"]
    <<: *testgroups_intl

rule-anchor:
  rule_domain: &rule_domain {type: "http", interval: 43200, proxy: "🌐国际选择", behavior: "domain", format: "mrs"}
  rule_ipcidr: &rule_ipcidr {type: "http", interval: 43200, proxy: "🌐国际选择", behavior: "ipcidr", format: "mrs"}
  rule_classical: &rule_classical {type: "http", interval: 43200, proxy: "🌐国际选择", behavior: "classical", format: "yaml"}

rule-providers:
  国内域名: {<<: *rule_domain, path: "./rule_providers/国内域名.mrs", url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  国际域名: {<<: *rule_domain, path: "./rule_providers/国际域名.mrs", url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"}
