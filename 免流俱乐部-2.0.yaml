  国内地址: {<<: *rule_ipcidr, path: "./rule_providers/国内地址.mrs", url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  国内域兜: {<<: *rule_classical, path: "./rule_providers/国内域兜.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/domain/国内域兜.yaml"}
  国际域兜: {<<: *rule_classical, path: "./rule_providers/国际域兜.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/domain/国际域兜.yaml"}
  拒绝域兜: {<<: *rule_classical, path: "./rule_providers/拒绝域兜.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/domain/拒绝域兜.yaml"}
  直连域兜: {<<: *rule_classical, path: "./rule_providers/直连域兜.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/domain/直连域兜.yaml"}
  国内进程: {<<: *rule_classical, path: "./rule_providers/国内进程.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/general/国内进程.yaml"}
  国际进程: {<<: *rule_classical, path: "./rule_providers/国际进程.yaml", url: "https://raw.githubusercontent.com/ke666e/rulebase/mihomo/rule/general/国际进程.yaml"}

rules:
  - "MATCH,🌀全局模式"
  - "RULE-SET,国内进程,🇨🇳国内选择"
  - "RULE-SET,国际进程,🌐国际选择"
  - "RULE-SET,广告域名,REJECT"
  - "RULE-SET,拒绝域兜,REJECT"
  - "RULE-SET,私有域名,DIRECT"
  - "RULE-SET,直连域兜,DIRECT"
  - "AND,((RULE-SET,国内域名),(NOT,((OR,((RULE-SET,屏蔽域名),(RULE-SET,国际域名),(RULE-SET,国际域兜)))))),🇨🇳国内选择"
  - "RULE-SET,国内域兜,🇨🇳国内选择"
  - "RULE-SET,私有地址,DIRECT,no-resolve"
  - "RULE-SET,国内地址,🇨🇳国内选择,no-resolve"
  - "MATCH,🌐国际选择"
