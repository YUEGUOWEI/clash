##########
## 免流俱乐部-分享配置
## 版本v2.0
## 免流俱乐部 TG群组：https://t.me/mljulebuqz
## 一份简洁、高效、易维护的配置

## 【详情】
## 策略组采用 手动+自动。
## 国内策略组为常规的正则过滤，国际策略组过滤采用"排尽法" 释义：排尽了国内剩下的就是国际节点！所以不需要写国际国家相关的名字进行正则过滤。
## 规则采用规则集，进程规则与兜底规则为免流俱乐部的G库规则，其它为官方规则。
## 规则采用多重判断匹配。
## udp跟随策略组完美分流。
## 初次使用请拉取"代理集"与"规则集"。
## 可以分享此配置，志同道合的网友可以加TG群一同交流进步！

## 2.0更新日志
## 修复漏"udp", 官方明确如节点无:"udp: true" 字段则路由规则继续向下匹配，修复逻辑如下:
## 为了避免部分节点无此字段，本次更新在"proxy-providers"中覆写"udp: true"字段，如此就算部分节点无此字段也会被覆写，避免规则模式下路由规则"漏udp"。

##########

proxy-anchor:
  proxyjihe: &proxyjihe
    {type: "http", interval: 43200, proxy: "🌐国际选择"}

  proxyfuxie: &proxyfuxie
    {override: {udp: true}}

  chainfuxie: &chainfuxie
    {override: {udp: true, dialer-proxy: "🔗链式前置"}}

proxy-providers:
  代理集合:
    {<<: [*proxyjihe, *proxyfuxie], path: "./proxy_providers/代理集合.yaml",
    url: "订阅链接"}

  链式集合:
    {<<: [*proxyjihe, *chainfuxie], path: "./proxy_providers/链式集合.yaml",
    url: "订阅链接"}

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: "rule"
log-level: "silent"
ipv6: true
find-process-mode: "always"
unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: "gvisor"
  device: "utun0"
  auto-route: true
  auto-detect-interface: true
  dns-hijack: ["udp://any:53", "tcp://any:53"]

dns:
  enable: true
  respect-rules: true
  listen: "0.0.0.0:1053"
  ipv6: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-range6: "fdfe:dcba:9876::1/64"
  default-nameserver: ["system"]
  direct-nameserver: ["system"]
  proxy-server-nameserver: ["system"]
  nameserver: ["https://dns.google/dns-query"]
  nameserver-policy: {"rule-set:国内域名": ["https://doh.pub/dns-query"]}

ntp:
  enable: true
  server: "time.google.com"
  port: 123
  interval: 30
  dialer-proxy: "🌐国际选择"

